<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0f0e17;
      --parchment: #fffbf2;
      --accent: #e84855;
      --gold: #c9a84c;
      --muted: #8a8a9a;
      --surface: #ffffff;
      --border: #e5e0d8;
      --done: #2ecc71;
      --pending: #f39c12;
      --shadow: 0 4px 24px rgba(15,14,23,.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--parchment);
      color: var(--ink);
      min-height: 100vh;
    }
    /* ── Header ── */
    header {
      background: var(--ink);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      color: var(--parchment);
      font-size: 1.4rem;
      letter-spacing: .02em;
    }
    .logo span { color: var(--gold); }
    /* ── Layout ── */
    main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; }
    /* ── Button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .6rem 1.2rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      transition: all .18s;
    }
    .btn-primary { background: var(--ink); color: var(--parchment); }
    .btn-primary:hover { background: #2a2940; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { filter: brightness(1.1); }
    .btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--border); }
    .btn-ghost:hover { background: var(--border); }
    .btn-sm { padding: .35rem .8rem; font-size: .82rem; }
    /* ── Books grid ── */
    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
    }
    .book-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      position: relative;
    }
    .book-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .book-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: .3rem; }
    .book-meta { color: var(--muted); font-size: .82rem; margin-bottom: .9rem; }
    .book-progress { margin-bottom: .8rem; }
    .progress-bar-track { background: var(--border); border-radius: 99px; height: 6px; margin-top: .3rem; }
    .progress-bar-fill { background: var(--gold); height: 6px; border-radius: 99px; transition: width .5s; }
    .progress-label { font-size: .78rem; color: var(--muted); display: flex; justify-content: space-between; }
    .book-actions { display: flex; gap: .5rem; margin-top: .8rem; }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      grid-column: 1 / -1;
    }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(15,14,23,.5);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 18px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 24px 80px rgba(0,0,0,.2);
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 1.2rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .85rem; font-weight: 500; margin-bottom: .4rem; }
    input, select, textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: .6rem .9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      background: var(--parchment);
      color: var(--ink);
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--ink); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; }
    .modal-footer { display: flex; justify-content: flex-end; gap: .7rem; margin-top: 1.2rem; }
    /* ── Toast ── */
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; display: flex; flex-direction: column; gap: .5rem; z-index: 999; }
    .toast {
      background: var(--ink);
      color: var(--parchment);
      padding: .7rem 1.2rem;
      border-radius: 10px;
      font-size: .88rem;
      box-shadow: var(--shadow);
      animation: fadeIn .2s ease;
    }
    .toast.success { border-left: 4px solid var(--done); }
    .toast.error { border-left: 4px solid var(--accent); }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; } }
  </style>
</head>
<body>

<header>
  <div class="logo">Book<span>Translator</span></div>
</header>

<main>
  <div class="section-header">
    <h2>Mis Libros</h2>
    <button class="btn btn-primary" onclick="openModal()">+ Nuevo libro</button>
  </div>

  <div class="books-grid" id="booksGrid">
    <div class="empty-state">
      <div class="empty-icon">📚</div>
      <p>Cargando libros…</p>
    </div>
  </div>
</main>

<!-- Create / Edit Book Modal -->
<div class="modal-overlay" id="bookModal">
  <div class="modal">
    <h3 id="modalTitle">Nuevo libro</h3>
    <div class="form-group">
      <label>Título *</label>
      <input type="text" id="bookTitle" placeholder="Ej: English Grammar in Use">
    </div>
    <div class="form-group">
      <label>Autor</label>
      <input type="text" id="bookAuthor" placeholder="Ej: Raymond Murphy">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Idioma original</label>
        <select id="sourceLang">
          <option value="English" selected>English</option>
          <option value="French">French</option>
          <option value="German">German</option>
          <option value="Italian">Italian</option>
          <option value="Portuguese">Portuguese</option>
        </select>
      </div>
      <div class="form-group">
        <label>Idioma destino</label>
        <select id="targetLang">
          <option value="Spanish" selected>Español</option>
          <option value="English">English</option>
          <option value="French">French</option>
          <option value="Portuguese">Portuguese</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea id="bookDesc" rows="2" placeholder="Descripción opcional…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveBook()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  let editingBookId = null;

  // ── API helpers ──────────────────────────────────────────────────────────
  async function api(url, opts = {}) {
    const res = await fetch(url, {
      headers: { 'Content-Type': 'application/json' },
      ...opts,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.error || 'Error del servidor');
    }
    return res.json();
  }

  // ── Toast ────────────────────────────────────────────────────────────────
  function toast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // ── Books ────────────────────────────────────────────────────────────────
  async function loadBooks() {
    const grid = document.getElementById('booksGrid');
    try {
      const books = await api('/api/books');
      if (!books.length) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📖</div><p>Aún no tienes libros.<br>Crea uno para comenzar.</p></div>`;
        return;
      }
      grid.innerHTML = books.map(renderBookCard).join('');
    } catch (e) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
    }
  }

  function renderBookCard(b) {
    const pct = b.total_pages ? Math.round((b.translated_pages / b.total_pages) * 100) : 0;
    return `
      <div class="book-card" onclick="goTranslate(${b.id})">
        <div class="book-title">${b.title}</div>
        <div class="book-meta">${b.author || 'Sin autor'} · ${b.source_language} → ${b.target_language}</div>
        <div class="book-progress">
          <div class="progress-label">
            <span>Progreso</span>
            <span>${b.translated_pages} / ${b.total_pages} pág.</span>
          </div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="book-actions" onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-sm" onclick="goTranslate(${b.id})">✏️ Traducir</button>
          <button class="btn btn-ghost btn-sm" onclick="editBook(${b.id}, event)">⚙️ Editar</button>
          <a href="/api/books/${b.id}/export/docx" class="btn btn-ghost btn-sm">⬇️ Word</a>
          <button class="btn btn-ghost btn-sm" style="color:var(--accent)" onclick="deleteBook(${b.id}, event)">🗑️</button>
        </div>
      </div>`;
  }

  function goTranslate(id) {
    window.location.href = `/books/${id}/translate`;
  }

  // ── Modal ────────────────────────────────────────────────────────────────
  function openModal(bookData = null) {
    editingBookId = bookData ? bookData.id : null;
    document.getElementById('modalTitle').textContent = bookData ? 'Editar libro' : 'Nuevo libro';
    document.getElementById('bookTitle').value = bookData?.title || '';
    document.getElementById('bookAuthor').value = bookData?.author || '';
    document.getElementById('sourceLang').value = bookData?.source_language || 'English';
    document.getElementById('targetLang').value = bookData?.target_language || 'Spanish';
    document.getElementById('bookDesc').value = bookData?.description || '';
    document.getElementById('bookModal').classList.add('open');
    document.getElementById('bookTitle').focus();
  }

  function closeModal() {
    document.getElementById('bookModal').classList.remove('open');
    editingBookId = null;
  }

  async function saveBook() {
    const title = document.getElementById('bookTitle').value.trim();
    if (!title) { toast('El título es requerido', 'error'); return; }
    const payload = {
      title,
      author: document.getElementById('bookAuthor').value.trim(),
      source_language: document.getElementById('sourceLang').value,
      target_language: document.getElementById('targetLang').value,
      description: document.getElementById('bookDesc').value.trim(),
    };
    try {
      if (editingBookId) {
        await api(`/api/books/${editingBookId}`, { method: 'PUT', body: JSON.stringify(payload) });
        toast('Libro actualizado');
      } else {
        await api('/api/books', { method: 'POST', body: JSON.stringify(payload) });
        toast('Libro creado ✓');
      }
      closeModal();
      loadBooks();
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  async function editBook(id, e) {
    e.stopPropagation();
    const book = await api(`/api/books/${id}`);
    openModal(book);
  }

  async function deleteBook(id, e) {
    e.stopPropagation();
    if (!confirm('¿Eliminar este libro y todas sus páginas?')) return;
    try {
      await api(`/api/books/${id}`, { method: 'DELETE' });
      toast('Libro eliminado');
      loadBooks();
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  // ── Keyboard shortcut ────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
  document.getElementById('bookModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  loadBooks();
</script>
</body>
</html>
